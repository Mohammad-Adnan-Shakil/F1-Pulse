# Local Development Configuration for DeltaBox Backend

# Server
server.port=8080

# Database (H2 for local testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=false
# spring.flyway.validate-on-migrate=false
# spring.flyway.locations=classpath:db/migration

# ML Service (mock for local)
ml.service.url=http://localhost:8000

# JWT (local development key)
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Groq API (local development - use environment variable in production)
groq.api.key=gsk_dummy_key_for_local_development
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Logging
logging.level.root=INFO
logging.level.com.f1pulse=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG

# CORS (local development)
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# OpenF1 API (local development)
openf1.api.baseUrl=https://api.openf1.org

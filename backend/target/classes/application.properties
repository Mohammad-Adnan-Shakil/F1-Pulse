# Base Configuration for DeltaBox Backend
server.port=${PORT:8080}

# Database (H2 for local development, PostgreSQL for production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.h2.console.enabled=${H2_CONSOLE:true}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# ML Service
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# JWT
jwt.secret=${JWT_SECRET_KEY:mySecretKey123456789012345678901234567890}
jwt.expiration=86400000

# Groq API
groq.api.key=${GROQ_API_KEY:gsk_dummy_key_for_local_development}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# OpenF1 API
openf1.api.baseUrl=${OPENF1_API_URL:https://api.openf1.org}

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.f1pulse=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:DEBUG}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:DEBUG}

# CORS
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174}

# Cache TTL (seconds)
cache.ttl.seconds=${CACHE_TTL:3600}
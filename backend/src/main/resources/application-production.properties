# 🚀 Production Profile Configuration for DeltaBox Backend
# This profile is activated when SPRING_PROFILES_ACTIVE=production

# Server
server.port=${PORT:8080}

# Database (PostgreSQL on Render)
# Spring Boot 3.x should parse DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/deltabox}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Flyway (temporarily disabled for debugging)
spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration
# spring.flyway.baseline-on-migrate=true

# ML Service (production URL from environment)
ml.service.url=${ML_SERVICE_URL}

# JWT (use environment variable in production)
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# Groq API
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Logging
logging.level.root=WARN
logging.level.com.f1pulse=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Actuator (health checks for Render)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.db.enabled=true

# CORS (allow frontend origin)
cors.allowed-origins=${FRONTEND_URL:*}

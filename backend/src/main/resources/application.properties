# Base Configuration for DeltaBox Backend
server.port=${PORT:8080}

# Database (PostgreSQL on Render) - Production only
# See application-production.properties for production database configuration

# JPA/Hibernate - Disable schema auto-creation for local testing with H2
spring.jpa.hibernate.ddl-auto=none

# Connection Pool (HikariCP) - Production only
# See application-production.properties for production connection pool configuration

# Flyway disabled temporarily
spring.flyway.enabled=false

# ML Service
ml.service.url=${ML_SERVICE_URL}

# JWT
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# Groq API
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Logging
logging.level.root=WARN
logging.level.com.f1pulse=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Actuator - Production only
# See application-production.properties for production Actuator configuration

# CORS
cors.allowed-origins=${FRONTEND_URL:*}